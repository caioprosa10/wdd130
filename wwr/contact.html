<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="Description" content="Get in touch with White Water Rafting for inquiries, reservations, and more.">
    <title>Contact us - White Water Rafting</title>
    <!--Google Fonts-->
<link href="https://fonts.googleapis.com/css2?family=Sevillana&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Sevillana&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/rafting copy.css"
</head>
<body>
    <header>
        <img src="images/logoraf.png" alt="rafting logo"/>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
      <section class="company-info">
        <h2>Contact Information</h2>
        <p><strong>Address:</strong> 123 Adventure Lane, River City, RC 12345</p>
        <p><strong>Phone:</strong> +1 (555) 123-4567</p>
        <p><strong>Email:</strong> info@whitewaterrafting.com</p>
        <!-- Embed Google Map -->
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3977.0045527931898!2d-77.86935171797514!3d-4.593204605484043!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x91c98b11b0f61d25%3A0x34fbd817b3ee81db!2sSanta%20Mar%C3%ADa%20de%20Nieva!5e0!3m2!1spt-PT!2sbr!4v1733585695669!5m2!1spt-PT!2sbr" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </section>
      <section class="team">
        <h2>Our Team</h2>
        <div class="profiles">
          <figure>
            <img src="images/employee1.jpg" alt="Employee 1">
            <figcaption>John Doe - Adventure Guide</figcaption>
          </figure>
          <figure>
            <img src="images/employee2.jpg" alt="Employee 2">
            <figcaption>Jane Smith - Reservations Manager</figcaption>
          </figure>
          <figure>
            <img src="images/employee3.jpg" alt="Employee 3">
            <figcaption>Mike Brown - Safety Specialist</figcaption>
          </figure>
        </div>
      </section>
      <section class="contact-form">
        <h2>Contact Us</h2>
        <form action="#" method="post">
          <label for="name">Your Name:</label>
          <input type="text" id="name" name="name" required>
      
          <label for="email">Your Email:</label>
          <input type="email" id="email" name="email" required>
      
          <fieldset>
            <legend>Purpose of Message:</legend>
            <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
            <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
            <label><input type="radio" name="purpose" value="website"> Website Suggestion</label>
          </fieldset>
      
          <label for="message">Your Message:</label>
          <textarea id="message" name="message" rows="5" required></textarea>
      
          <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label>
      
          <button type="submit">Send Message</button>
        </form>
      </section>
      
      
    </main>

    <footer>
        <p>&copy; 2024 White Water Rafting | Created by Caio Palladino Da Rosa</p>
        <a href="https://facebook.com">
            <img src="images/facebookicon.png" alt="Facebook">
        </a>
        <a href="https://twitter.com">
            <img src="images/twittericon.png" alt="Twitter">
        </a>
        <a href="https://instagram.com">
            <img src="images/instagramicon.png" alt="Instagram">
        </a>
    </footer>
</body>
</html>
